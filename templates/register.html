<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <title>Register</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>

    body{
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button{
      width: 100%;
      padding: 12px;
      margin-top: 20px;
    }

  </style>

</head>

<body>

<h2>ลงทะเบียน</h2>

<input
  type="text"
  id="name"
  placeholder="ชื่อ"
/>

<input
  type="text"
  id="phone"
  placeholder="เบอร์โทร"
/>

<input
  type="email"
  id="email"
  placeholder="Email"
/>

<button onclick="saveRegister()">
  บันทึกข้อมูล
</button>

<script>

const workerId = "{{ worker }}"

const liffId = "{{ liff_id }}"

async function initLIFF(){

    await liff.init({

        liffId: liffId
    })

    if(!liff.isLoggedIn()){

        liff.login()

        return
    }
}

initLIFF()

async function saveRegister(){

    try{

        const profile =
            await liff.getProfile()

        const userId =
            profile.userId

        const name =
            document.getElementById(
                "name"
            ).value

        const phone =
            document.getElementById(
                "phone"
            ).value

        const email =
            document.getElementById(
                "email"
            ).value

        // =====================================
        // GET WORKER URL
        // =====================================
        const workerDoc =
            await fetch(

                "/get-worker-url/" +
                workerId
            )

        const workerResult =
            await workerDoc.json()

        const workerRegisterUrl = "https://gitbackend-416424538655.asia-southeast3.run.app"
           // workerResult.register_url

        // =====================================
        // SAVE
        // =====================================
        const response =
            await fetch(

                workerRegisterUrl +
                "/register-user",

                {
                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({

                        user_id: userId,

                        name: name,

                        phone: phone,

                        email: email
                    })
                }
            )

        const result =
            await response.json()

        alert("ลงทะเบียนสำเร็จ")

        liff.closeWindow()

    }catch(e){

        console.error(e)

        alert("เกิดข้อผิดพลาด")
    }
}

</script>

</body>
</html>
