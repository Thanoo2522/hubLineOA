<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <!-- FIXED LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h2>ลงทะเบียน</h2>

<input id="name" placeholder="ชื่อ">
<input id="phone" placeholder="เบอร์โทร">
<input id="email" placeholder="Email">

<button onclick="saveRegister()">บันทึกข้อมูล</button>

<script>

const workerId = new URLSearchParams(window.location.search).get("worker");
const liffId = "{{ liff_id }}";

// =====================================================
// INIT LIFF
// =====================================================
async function initLIFF() {
    try {
        await liff.init({ liffId });

        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

    } catch (err) {
        console.error("LIFF error", err);
        alert("LIFF init error");
    }
}

initLIFF();

// =====================================================
// REGISTER
// =====================================================
async function saveRegister() {

    try {
        let userId = "test_user";

        if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            userId = profile.userId;
        }

        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const email = document.getElementById("email").value;

        if (!name || !phone || !email) {
            alert("กรอกข้อมูลให้ครบ");
            return;
        }

        // GET WORKER URL
        const res = await fetch(`/get-worker-url/${workerId}`);
        const workerData = await res.json();

        if (!workerData.cloud_url) {
            throw new Error("worker url not found");
        }

        let workerUrl = workerData.cloud_url.replace(/\/$/, "");

        // SEND TO WORKER
        const response = await fetch(workerUrl + "/register-user", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id: userId,
                name,
                phone,
                email
            })
        });

        if (!response.ok) {
            throw new Error("register failed");
        }

        alert("ลงทะเบียนสำเร็จ");

        if (liff.isInClient()) {
            liff.closeWindow();
        }

    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
}

</script>

</body>
</html>
