<script>

const LIFF_ID =
  "2010064672-zx1EQTMH"

const HUB_URL =
  "https://hublineoa-369387278497.asia-southeast3.run.app"

let WORKER_URL = ""
let WORKER_ID = ""

// =====================================================
// STATUS
// =====================================================
function setStatus(text) {

  document.getElementById(
    "status"
  ).innerText = text
}

// =====================================================
// INIT
// =====================================================
async function init() {

  try {

    setStatus("1. เริ่มต้นระบบ")

    // ===============================================
    // LIFF INIT
    // ===============================================
    await liff.init({

      liffId: LIFF_ID
    })

    setStatus("2. LIFF INIT สำเร็จ")

    // ===============================================
    // LOGIN
    // ===============================================
    if (!liff.isLoggedIn()) {

      setStatus("3. LOGIN")

      liff.login()

      return
    }

    setStatus("4. LOGIN SUCCESS")

    // ===============================================
    // GET WORKER
    // ===============================================
    const params =
      new URLSearchParams(
        window.location.search
      )

    WORKER_ID =
      params.get("worker")

    console.log(
      "WORKER_ID =",
      WORKER_ID
    )

    if (!WORKER_ID) {

      alert("ไม่พบ worker")

      return
    }

    setStatus(
      "5. โหลด worker"
    )

    // ===============================================
    // LOAD WORKER URL
    // ===============================================
    const response = await fetch(

      `${HUB_URL}/get-worker-url/${WORKER_ID}`

    )

    setStatus(
      "6. โหลด worker สำเร็จ"
    )

    const json =
      await response.json()

    console.log(json)

    if (json.status !== "ok") {

      alert("โหลด worker ไม่สำเร็จ")

      return
    }

    WORKER_URL =
      json.register_url

    console.log(
      "WORKER_URL =",
      WORKER_URL
    )

    setStatus("พร้อมสมัครสมาชิก")

  } catch(err) {

    console.error(err)

    alert(

      "INIT ERROR\n\n" +

      JSON.stringify(err)
    )

    setStatus("ERROR")
  }
}

// =====================================================
// REGISTER
// =====================================================
async function registerUser() {

  try {

    setStatus("กำลังสมัคร...")

    // ===============================================
    // GET PROFILE
    // ===============================================
    const profile =
      await liff.getProfile()

    console.log(profile)

    // ===============================================
    // PAYLOAD
    // ===============================================
    const payload = {

      userId:
        profile.userId,

      displayName:
        profile.displayName,

      pictureUrl:
        profile.pictureUrl,

      workerId:
        WORKER_ID,

      name:
        document.getElementById("name").value,

      phone:
        document.getElementById("phone").value,

      address:
        document.getElementById("address").value
    }

    console.log(payload)

    // ===============================================
    // SEND REGISTER
    // ===============================================
    const response = await fetch(

      WORKER_URL,

      {

        method: "POST",

        headers: {

          "Content-Type":
            "application/json"
        },

        body: JSON.stringify(
          payload
        )
      }
    )

    const json =
      await response.json()

    console.log(json)

    // ===============================================
    // SUCCESS
    // ===============================================
    if (json.status === "ok") {

      setStatus("สมัครสำเร็จ")

      alert("สมัครสำเร็จ")

      // ===========================================
      // CLOSE WINDOW
      // ===========================================
      if (liff.isInClient()) {

        liff.closeWindow()
      }

      return
    }

    // ===============================================
    // FAIL
    // ===============================================
    alert("สมัครไม่สำเร็จ")

    setStatus("สมัครไม่สำเร็จ")

  } catch(err) {

    console.error(err)

    alert(

      "REGISTER ERROR\n\n" +

      JSON.stringify(err)
    )

    setStatus("ERROR")
  }
}

// =====================================================
// START
// =====================================================
init()

</script>
