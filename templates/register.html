<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #06c755;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อ">
<input id="home" placeholder="หมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button onclick="register()">สมัคร</button>

<script>

const HUB_URL = "https://hublineoa-369387278497.asia-southeast3.run.app"

let WORKER_ID = ""
let REGISTER_URL = ""

async function init() {

  await liff.init({ liffId: "2010064672-zx1EQTMH" })

  if (!liff.isLoggedIn()) {
    liff.login()
    return
  }

  const params = new URLSearchParams(window.location.search)
  WORKER_ID = params.get("worker")

  const res = await fetch(`${HUB_URL}/get-worker-url/${WORKER_ID}`)
  const json = await res.json()

  REGISTER_URL = json.register_url
}

async function register() {

  const profile = await liff.getProfile()

  const data = {
    userId: profile.userId,
    displayName: profile.displayName,
    pictureUrl: profile.pictureUrl,
    workerId: WORKER_ID,

    name: document.getElementById("name").value,
    home: document.getElementById("home").value,
    address: document.getElementById("address").value,
    phone: document.getElementById("phone").value
  }

  const res = await fetch(REGISTER_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  })

  const json = await res.json()

  if (json.status === "ok") {
    alert("สมัครสำเร็จ")
    liff.closeWindow()
  } else {
    alert("ไม่สำเร็จ")
  }
}

init()

</script>

</body>
</html>
