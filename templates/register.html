<script>

const LIFF_ID = "2010064672-zx1EQTMH"
const HUB_URL = "https://hublineoa-369387278497.asia-southeast3.run.app"

let WORKER_URL = ""
let WORKER_ID = ""

async function init() {

  try {

    const params = new URLSearchParams(window.location.search)

    WORKER_ID = params.get("worker")

    if (!WORKER_ID) {
      alert("NO WORKER ID")
      return
    }

    const response = await fetch(`${HUB_URL}/get-worker-url/${WORKER_ID}`)
    const json = await response.json()

    console.log("WORKER URL:", json)

    if (!json.register_url) {
      alert("NO REGISTER URL")
      return
    }

    WORKER_URL = json.register_url

    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
      return
    }

    document.getElementById("status").innerText = "พร้อมสมัคร"

  } catch (err) {
    alert("INIT ERROR: " + err)
  }
}

async function registerUser() {

  try {

    const profile = await liff.getProfile()

    const payload = {

      userId: profile.userId,
      displayName: profile.displayName,
      pictureUrl: profile.pictureUrl,
      workerId: WORKER_ID,
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value
    }

    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    })

    const json = await res.json()

    if (json.status === "ok") {
      alert("สมัครสำเร็จ")
      liff.closeWindow()
    }

  } catch (err) {
    alert("REGISTER ERROR: " + err)
  }
}

init()

</script>
