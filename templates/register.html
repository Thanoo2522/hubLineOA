<!DOCTYPE html>
<html lang="th">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Register</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>

    body {

      font-family: Arial;

      max-width: 400px;

      margin: auto;

      padding: 20px;
    }

    h2 {

      text-align: center;
    }

    input {

      width: 100%;

      padding: 12px;

      margin-top: 10px;

      box-sizing: border-box;
    }

    button {

      width: 100%;

      padding: 14px;

      margin-top: 20px;

      background: #06c755;

      color: white;

      border: none;

      border-radius: 8px;

      font-size: 16px;

      cursor: pointer;
    }

    button:disabled {

      background: gray;
    }

  </style>

</head>

<body>

<h2>ลงทะเบียน</h2>

<input
  id="name"
  placeholder="ชื่อ"
/>

<input
  id="phone"
  placeholder="เบอร์โทร"
/>

<input
  id="email"
  placeholder="Email"
/>

<button
  id="saveBtn"
  onclick="saveRegister()"
>
  บันทึกข้อมูล
</button>

<script>

//
// LIFF ID
//

const liffId = "{{ liff_id }}";

//
// FIX WORKER URL
//

const workerUrl =
  "https://gitbackend-416424538655.asia-southeast3.run.app";

console.log("WORKER URL =", workerUrl);

//
// INIT LIFF
//

async function initLIFF() {

    try {

        console.log("INIT LIFF");

        await liff.init({

            liffId: liffId
        });

        console.log("LIFF READY");

        if (!liff.isLoggedIn()) {

            liff.login();

            return;
        }

    } catch (err) {

        console.error("LIFF ERROR:", err);

        alert("LIFF INIT ERROR");
    }
}

initLIFF();

//
// REGISTER
//

async function saveRegister() {

    try {

        const btn =
          document.getElementById("saveBtn");

        btn.disabled = true;

        //
        // VALIDATE
        //

        const name =
          document.getElementById("name")
          .value
          .trim();

        const phone =
          document.getElementById("phone")
          .value
          .trim();

        const email =
          document.getElementById("email")
          .value
          .trim();

        if (!name || !phone || !email) {

            alert("กรอกข้อมูลให้ครบ");

            btn.disabled = false;

            return;
        }

        //
        // GET LINE PROFILE
        //

        let userId = "unknown";

        if (liff.isLoggedIn()) {

            const profile =
              await liff.getProfile();

            console.log("PROFILE =", profile);

            userId = profile.userId;
        }

        console.log("USER ID =", userId);

        //
        // SEND REGISTER
        //

        console.log("SEND REGISTER");

        const registerRes =
          await fetch(
            workerUrl + "/register-user",
            {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    user_id: userId,

                    name: name,

                    phone: phone,

                    email: email
                })
            }
          );

        console.log(
          "REGISTER STATUS =",
          registerRes.status
        );

        const registerJson =
          await registerRes.json();

        console.log(
          "REGISTER RESULT =",
          registerJson
        );

        if (!registerRes.ok) {

            throw new Error(

              registerJson.message ||

              "register failed"
            );
        }

        //
        // SUCCESS
        //

        alert("ลงทะเบียนสำเร็จ");

        if (liff.isInClient()) {

            liff.closeWindow();
        }

    } catch (err) {

        console.error(
          "REGISTER ERROR:",
          err
        );

        alert(
          "ERROR: " + err.message
        );

    } finally {

        document
          .getElementById("saveBtn")
          .disabled = false;
    }
}

</script>

</body>
</html>
