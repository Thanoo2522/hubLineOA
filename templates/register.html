<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>Register</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อ"><br><br>

<input id="phone" placeholder="เบอร์โทร"><br><br>

<input id="address" placeholder="ที่อยู่"><br><br>

<button onclick="registerUser()">
สมัครสมาชิก
</button>

<p id="status">กำลังโหลด...</p>

<script>

const LIFF_ID =
  "2010064672-zx1EQTMH"

const HUB_URL =
  "https://hublineoa-369387278497.asia-southeast3.run.app"

let WORKER_URL = ""
let WORKER_ID = ""

async function init() {

  await liff.init({

    liffId: LIFF_ID
  })

  if (!liff.isLoggedIn()) {

    liff.login()

    return
  }

  const params =
    new URLSearchParams(
      window.location.search
    )

  WORKER_ID =
    params.get("worker")

  const response = await fetch(

    `${HUB_URL}/get-worker-url/${WORKER_ID}`

  )

  const json =
    await response.json()

  WORKER_URL =
    json.register_url

  document.getElementById(
    "status"
  ).innerText = "พร้อมสมัคร"
}

async function registerUser() {

  const profile =
    await liff.getProfile()

  const payload = {

    userId:
      profile.userId,

    displayName:
      profile.displayName,

    pictureUrl:
      profile.pictureUrl,

    workerId:
      WORKER_ID,

    name:
      document.getElementById("name").value,

    phone:
      document.getElementById("phone").value,

    address:
      document.getElementById("address").value
  }

  const response = await fetch(

    WORKER_URL,

    {

      method: "POST",

      headers: {

        "Content-Type":
          "application/json"
      },

      body: JSON.stringify(
        payload
      )
    }
  )

  const json =
    await response.json()

  if (json.status === "ok") {

    alert("สมัครสำเร็จ")

    liff.closeWindow()

  } else {

    alert("สมัครไม่สำเร็จ")
  }
}

init()

</script>

</body>
</html>
